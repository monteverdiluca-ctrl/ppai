<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Coach — assistente mano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#14171d;--panel:#1c212b;--panel2:#232a36;--line:#2c3542;--text:#e9eef4;
    --muted:#8b95a4;--cream:#f3eee1;--raise:#d8373f;--call:#1f9d7a;--check:#3a86c8;
    --fold:#6b7480;--gold:#d6a13c;--redsuit:#c8323b;--blacksuit:#1a1d24;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#1b212c,var(--ink));
    color:var(--text);font-family:Inter,system-ui,sans-serif;line-height:1.5;padding:26px 14px 70px}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:27px;letter-spacing:-.5px;margin:0}
  .sub{color:var(--muted);font-size:13.5px;margin:3px 0 22px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:18px;margin-bottom:16px}
  .eyebrow{font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .eyebrow::before{content:"";width:14px;height:2px;background:var(--gold)}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:9px 15px;border-radius:999px;border:1px solid var(--line);background:#161b23;color:var(--text);
    cursor:pointer;font-size:14px;font-family:inherit;transition:.12s}
  .chip.on{background:var(--gold);color:#1a1208;border-color:var(--gold);font-weight:600}
  .chip:hover:not(.on){border-color:var(--gold)}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .field{flex:1;min-width:120px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input,.field select{width:100%;background:#161b23;border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:9px 11px;font-size:15px;font-family:inherit}
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
  .slots{display:flex;gap:9px;flex-wrap:wrap}
  .slot{width:52px;height:72px;border-radius:8px;border:2px dashed #39424f;background:#161b23;display:flex;
    align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .slot.active{border-style:solid;border-color:var(--gold);box-shadow:0 0 0 3px rgba(214,161,60,.18)}
  .slot .ph{color:#4d5763;font-size:20px}
  .pc{width:100%;height:100%;border-radius:6px;background:var(--cream);color:var(--blacksuit);display:flex;
    flex-direction:column;justify-content:space-between;padding:5px 6px;font-family:'Space Grotesk',sans-serif;font-weight:700}
  .pc.red{color:var(--redsuit)}.pc .r{font-size:15px}.pc .s{font-size:18px;text-align:right}
  .picker{margin-top:10px}
  .suit-row{font-size:11px;color:var(--muted);margin:10px 0 4px;letter-spacing:1px}
  .pgrid{display:grid;grid-template-columns:repeat(13,1fr);gap:4px}
  .pk{aspect-ratio:3/4;border-radius:4px;background:var(--cream);color:var(--blacksuit);border:none;cursor:pointer;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;padding:0}
  .pk.red{color:var(--redsuit)}.pk:disabled{opacity:.2;cursor:default}
  .btn{background:var(--gold);color:#1a1208;border:none;border-radius:9px;padding:12px 20px;font-size:15px;
    font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
  /* stato mano */
  .state{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--muted);
    background:#11151c;border:1px solid var(--line);border-radius:11px;padding:11px 15px;margin-bottom:16px}
  .state b{color:var(--text);font-weight:600}
  .state .mini{display:inline-flex;gap:3px;vertical-align:-3px}
  .mc{width:16px;height:22px;border-radius:3px;background:var(--cream);color:var(--blacksuit);font-size:9px;
    font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
  .mc.red{color:var(--redsuit)}
  /* verdetto */
  .verdict{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:38px;letter-spacing:-1px;margin:4px 0;text-align:center}
  .verdict small{display:block;font-size:14px;font-weight:500;color:var(--muted);margin-top:2px}
  .v-raise{color:var(--raise)}.v-call{color:var(--call)}.v-check{color:var(--check)}.v-fold{color:var(--fold)}
  .reason{color:#c3ccd8;font-size:14px;text-align:center;max-width:520px;margin:4px auto 0}
  .stats{display:flex;gap:20px;justify-content:center;margin:14px 0 2px;flex-wrap:wrap}
  .stat .n{font-family:'Space Grotesk',sans-serif;font-size:23px;font-weight:700}
  .stat .k{font-size:10.5px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .eqbar{height:7px;border-radius:5px;background:#11151c;margin:12px auto 0;max-width:520px;overflow:hidden}
  .eqbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--fold),var(--gold),var(--call));width:0;transition:width .4s}
  .q{font-size:15px;margin:2px 0 12px;color:#dfe6ee}
  .hidden{display:none}
  .note{font-size:12.5px;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Poker Coach</h1>
  <p class="sub">Assistente mano · Texas Hold'em 6-max · ti guida da preflop al river</p>

  <!-- ============ SETUP ============ -->
  <div id="setup">
    <div class="panel">
      <p class="eyebrow">1 · Giocatori al tavolo</p>
      <div class="chips" id="tableChips"></div>
    </div>
    <div class="panel" id="posPanel">
      <p class="eyebrow">2 · La tua posizione</p>
      <div class="chips" id="posChips"></div>
      <p class="note" id="posNote"></p>
    </div>
    <div class="panel">
      <p class="eyebrow">3 · Avversari nella mano</p>
      <div class="chips" id="oppChips"></div>
    </div>
    <div class="panel">
      <p class="eyebrow">4 · Le tue carte</p>
      <div class="slots" id="holeSlots"></div>
      <div class="picker" id="holePicker"></div>
    </div>
    <button class="btn" id="startBtn" disabled>Inizia la mano →</button>
  </div>

  <!-- ============ GIOCO ============ -->
  <div id="play" class="hidden">
    <div class="state" id="stateBar"></div>
    <div class="panel" id="step"></div>
    <div class="btns">
      <button class="btn ghost" id="resetBtn">↺ Nuova mano</button>
    </div>
  </div>
</div>

<script>
/* ===================== DATI: range per posizione ===================== */
const RFI = {
 UTG:new Set(["22","33","44","55","66","76s","77","87s","88","98s","99","AA","AJo","AJs","AKo","AKs","AQo","AQs","ATs","JJ","JTs","KJs","KK","KQo","KQs","KTs","QJs","QQ","QTs","T9s","TT"]),
 MP:new Set(["22","33","44","55","65s","66","76s","77","87s","88","98s","99","A4s","A5s","A9s","AA","AJo","AJs","AKo","AKs","AQo","AQs","ATo","ATs","J9s","JJ","JTs","KJo","KJs","KK","KQo","KQs","KTs","QJo","QJs","QQ","QTs","T9s","TT"]),
 CO:new Set(["22","33","44","54s","55","65s","66","75s","76s","77","86s","87s","88","97s","98s","99","A2s","A3s","A4s","A5s","A6s","A7s","A8s","A9o","A9s","AA","AJo","AJs","AKo","AKs","AQo","AQs","ATo","ATs","J9s","JJ","JTo","JTs","K9s","KJo","KJs","KK","KQo","KQs","KTo","KTs","Q9s","QJo","QJs","QQ","QTo","QTs","T8s","T9s","TT"]),
 BTN:new Set(["22","33","43s","44","54s","55","64s","65s","66","75s","76s","77","86s","87s","88","96s","97s","98o","98s","99","A2o","A2s","A3o","A3s","A4o","A4s","A5o","A5s","A6o","A6s","A7o","A7s","A8o","A8s","A9o","A9s","AA","AJo","AJs","AKo","AKs","AQo","AQs","ATo","ATs","J7s","J8s","J9o","J9s","JJ","JTo","JTs","K2s","K3s","K4s","K5s","K6s","K7s","K8o","K8s","K9o","K9s","KJo","KJs","KK","KQo","KQs","KTo","KTs","Q5s","Q6s","Q7s","Q8s","Q9o","Q9s","QJo","QJs","QQ","QTo","QTs","T7s","T8s","T9o","T9s","TT"]),
 SB:new Set(["22","33","44","54s","55","65s","66","75s","76s","77","86s","87s","88","96s","97s","98o","98s","99","A2s","A3s","A4o","A4s","A5o","A5s","A6o","A6s","A7o","A7s","A8o","A8s","A9o","A9s","AA","AJo","AJs","AKo","AKs","AQo","AQs","ATo","ATs","J5s","J6s","J7s","J8s","J9o","J9s","JJ","JTo","JTs","K2s","K3s","K4s","K5s","K6s","K7s","K8o","K8s","K9o","K9s","KJo","KJs","KK","KQo","KQs","KTo","KTs","Q3s","Q4s","Q5s","Q6s","Q7s","Q8s","Q9o","Q9s","QJo","QJs","QQ","QTo","QTs","T6s","T7s","T8o","T8s","T9o","T9s","TT"]),
 BB:new Set()
};
const BTN3=new Set(["22","33","43s","44","53s","54s","55","64s","65s","66","74s","75s","76o","76s","77","85s","86s","87o","87s","88","95s","96s","97o","97s","98o","98s","99","A2o","A2s","A3o","A3s","A4o","A4s","A5o","A5s","A6o","A6s","A7o","A7s","A8o","A8s","A9o","A9s","AA","AJo","AJs","AKo","AKs","AQo","AQs","ATo","ATs","J4s","J5s","J6s","J7s","J8o","J8s","J9o","J9s","JJ","JTo","JTs","K2s","K3s","K4s","K5s","K6o","K6s","K7o","K7s","K8o","K8s","K9o","K9s","KJo","KJs","KK","KQo","KQs","KTo","KTs","Q2s","Q3s","Q4s","Q5s","Q6s","Q7s","Q8o","Q8s","Q9o","Q9s","QJo","QJs","QQ","QTo","QTs","T6s","T7s","T8o","T8s","T9o","T9s","TT"]);
const POSITIONS={3:["BTN","SB","BB"],6:["UTG","MP","CO","BTN","SB","BB"]};
const RFI_PCT={3:{BTN:53,SB:42,BB:0},6:{UTG:14,MP:18,CO:25,BTN:42,SB:42,BB:0}};
function rfiFor(table,pos){ return (table===3&&pos==="BTN")?BTN3:RFI[pos]; }
const THREEBET=new Set(["A4s","A5s","AA","AKo","AKs","KK","KQs","QQ"]);
const FOURBET=new Set(["AA","AKs","KK"]);
const OPEN_SIZE={UTG:"2.5 BB",MP:"2.5 BB",CO:"2.3 BB",BTN:"2.2 BB",SB:"3 BB",BB:"—"};
const RANK=["AA","KK","QQ","JJ","TT","99","88","AKs","AQs","77","AJs","ATs","AQo","KQs","AKo","KJs","AJo","ATo","KQo","66","KTs","A9s","A8s","A7s","KTo","A5o","A8o","A9o","A4s","55","K9s","QJo","QJs","KJo","QTo","A6o","K6o","A6s","QTs","A5s","Q9s","A7o","A4o","A3s","A2s","K5s","JTs","T9s","A3o","K8s","K9o","JTo","44","K7s","J8s","K6s","Q9o","J9s","A2o","33","Q6s","K8o","Q8s","K7o","Q8o","97s","Q7s","K4s","K5o","Q4s","T9o","98s","Q7o","J9o","K2o","J8o","K3o","J7s","K3s","J5s","K2s","K4o","T8s","J4s","Q5o","Q3s","J7o","Q5s","22","T6s","T7s","Q3o","J6s","T8o","Q6o","J6o","98o","Q4o","Q2s","96s","95s","T7o","J4o","J3s","J5o","J2s","86s","T5s","Q2o","T6o","87o","96o","97o","T4s","76s","87s","T2s","94s","J3o","75s","T3s","T5o","85s","J2o","84s","T4o","86o","T3o","T2o","54s","95o","64s","93s","65s","76o","83s","74s","85o","92s","84o","53s","65o","75o","73s","83o","94o","74o","72s","92o","82s","93o","63s","63o","52s","42s","62s","64o","54o","43s","43o","82o","52o","73o","53o","32s","72o","42o","62o","32o"];
const RANKCHAR={14:"A",13:"K",12:"Q",11:"J",10:"T",9:"9",8:"8",7:"7",6:"6",5:"5",4:"4",3:"3",2:"2"};
const SUITS=["\u2660","\u2665","\u2666","\u2663"];
const PICK_RANKS=[["A",14],["K",13],["Q",12],["J",11],["10",10],["9",9],["8",8],["7",7],["6",6],["5",5],["4",4],["3",3],["2",2]];

/* ===================== VALUTATORE (validato vs treys) ===================== */
function score5(cs){const ranks=cs.map(c=>c.r).sort((a,b)=>b-a);const flush=cs.every(c=>c.s===cs[0].s);
  const cnt={};ranks.forEach(r=>cnt[r]=(cnt[r]||0)+1);
  const groups=Object.keys(cnt).map(Number).sort((a,b)=>cnt[b]-cnt[a]||b-a);const counts=groups.map(g=>cnt[g]);
  const uniq=[...new Set(ranks)].sort((a,b)=>b-a);let sh=null;
  if(uniq.length===5){if(uniq[0]-uniq[4]===4)sh=uniq[0];else if(uniq.join()==="14,5,4,3,2")sh=5;}
  if(flush&&sh)return[8,sh];if(counts[0]===4)return[7,groups[0],groups[1]];
  if(counts[0]===3&&counts[1]===2)return[6,groups[0],groups[1]];if(flush)return[5,...ranks];
  if(sh)return[4,sh];if(counts[0]===3)return[3,groups[0],groups[1],groups[2]];
  if(counts[0]===2&&counts[1]===2)return[2,groups[0],groups[1],groups[2]];
  if(counts[0]===2)return[1,groups[0],groups[1],groups[2],groups[3]];return[0,...ranks];}
function cmp(a,b){const n=Math.min(a.length,b.length);for(let i=0;i<n;i++)if(a[i]!==b[i])return a[i]-b[i];return 0;}
function best7(cards){let best=null;for(let i=0;i<7;i++)for(let j=i+1;j<7;j++){const f=[];
  for(let k=0;k<7;k++)if(k!==i&&k!==j)f.push(cards[k]);const sc=score5(f);if(best===null||cmp(sc,best)>0)best=sc;}return best;}
function canon(a,b){const hi=Math.max(a.r,b.r),lo=Math.min(a.r,b.r);
  if(hi===lo)return RANKCHAR[hi]+RANKCHAR[hi];return RANKCHAR[hi]+RANKCHAR[lo]+(a.s===b.s?"s":"o");}
function fullDeck(){const d=[];for(let r=2;r<=14;r++)for(let s=0;s<4;s++)d.push({r,s});return d;}

/* equity contro nOpp avversari; oppFrac<1 = avversari "stretti" (top frazione di RANK) */
function equity(hole,board,nOpp,oppFrac,sims){
  const known=new Set([...hole,...board].map(c=>c.r*4+c.s));
  const deck=fullDeck().filter(c=>!known.has(c.r*4+c.s));
  let allowed=null;
  if(oppFrac<1){const n=Math.round(oppFrac*169);allowed=new Set(RANK.slice(0,n));}
  let score=0;
  for(let s=0;s<sims;s++){
    for(let i=deck.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[deck[i],deck[j]]=[deck[j],deck[i]];}
    let idx=0;const opps=[];let ok=true;
    for(let o=0;o<nOpp;o++){
      let pair=[deck[idx],deck[idx+1]],tries=0;
      while(allowed&&!allowed.has(canon(pair[0],pair[1]))&&tries<8){
        // rimescola solo la coda per trovare una mano nel range
        for(let i=deck.length-1;i>idx;i--){const j=idx+((Math.random()*(i-idx+1))|0);[deck[i],deck[j]]=[deck[j],deck[i]];}
        pair=[deck[idx],deck[idx+1]];tries++;}
      opps.push(pair);idx+=2;
    }
    const need=5-board.length;const fill=deck.slice(idx,idx+need);const fb=board.concat(fill);
    const my=best7(hole.concat(fb));let bestOpp=null,tie=0;
    for(const op of opps){const sc=best7(op.concat(fb));const c=cmp(sc,my);
      if(bestOpp===null||cmp(sc,bestOpp)>0)bestOpp=sc;}
    const c=cmp(my,bestOpp);
    if(c>0)score+=1;else if(c===0){let eq=1;for(const op of opps)if(cmp(best7(op.concat(fb)),my)===0)eq++;score+=1/eq;}
  }
  return score/sims;
}

/* ===================== STATO ===================== */
const S={table:null,pos:null,nOpp:null,hole:[null,null],board:[],street:"setup",pot:0,toCall:0,
  villainFrac:0.55,scenario:null,active:null};
const pct=x=>Math.round(x*100)+"%";

/* ---- carte / picker condiviso ---- */
function cardFace(c,cls){const red=(c.s===1||c.s===2);const rk=c.r===10?"10":RANKCHAR[c.r];
  return `<div class="${cls}${red?' red':''}"><div class="r">${rk}</div><div class="s">${SUITS[c.s]}</div></div>`;}
function miniCards(arr){return arr.filter(Boolean).map(c=>{const red=(c.s===1||c.s===2);
  const rk=c.r===10?"10":RANKCHAR[c.r];return `<span class="mc${red?' red':''}">${rk}${SUITS[c.s]}</span>`;}).join("");}
function usedSet(){return new Set([...S.hole,...S.board].filter(Boolean).map(c=>c.r*4+c.s));}
function renderPicker(containerId){
  const used=usedSet();let html="";
  SUITS.forEach((suit,s)=>{const red=(s===1||s===2);
    html+=`<div class="suit-row">${suit} ${["Picche","Cuori","Quadri","Fiori"][s]}</div><div class="pgrid">`;
    PICK_RANKS.forEach(([lab,r])=>{const id=r*4+s,dis=used.has(id)?"disabled":"";
      html+=`<button class="pk${red?' red':''}" ${dis} data-r="${r}" data-s="${s}">${lab}${suit}</button>`;});
    html+="</div>";});
  const wrap=document.getElementById(containerId);wrap.innerHTML=html;
  wrap.querySelectorAll(".pk").forEach(b=>b.onclick=()=>{
    const c={r:+b.dataset.r,s:+b.dataset.s};
    if(S.active){arrOf(S.active.id)[S.active.idx]=c;advanceActive();}
    rerender();});
}
function arrOf(id){return id==="hole"?S.hole:S.board;}
function advanceActive(){
  if(!S.active)return;const arr=arrOf(S.active.id);
  for(let i=0;i<arr.length;i++)if(!arr[i]){S.active={idx:i,id:S.active.id};return;}
}

/* ===================== SETUP ===================== */
function renderSetup(){
  const tableC=document.getElementById("tableChips");
  tableC.innerHTML=[[3,"3 giocatori"],[6,"6 giocatori"]].map(([n,l])=>
    `<button class="chip${S.table===n?' on':''}" data-n="${n}">${l}</button>`).join("");
  tableC.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{S.table=+b.dataset.n;
    if(S.pos&&!POSITIONS[S.table].includes(S.pos))S.pos=null;
    renderSetup();checkStart();});

  const posPanel=document.getElementById("posPanel");
  posPanel.style.opacity=S.table?"1":"0.45";
  const posC=document.getElementById("posChips");
  const positions=S.table?POSITIONS[S.table]:[];
  posC.innerHTML=positions.length?positions.map(p=>
    `<button class="chip${S.pos===p?' on':''}" data-p="${p}">${p}</button>`).join("")
    :'<span class="note">Scegli prima il numero di giocatori.</span>';
  posC.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{S.pos=b.dataset.p;
    document.getElementById("posNote").textContent =
      S.pos==="BB"?"Dal big blind di solito non apri: sei l'ultimo a parlare. Userai lo scenario \u201caffronto un rilancio\u201d.":
      `Range di apertura di riferimento: ~${RFI_PCT[S.table][S.pos]}% delle mani${S.table===3?" (tavolo 3-handed, più largo)":""}.`;
    renderSetup();checkStart();});
  const oppC=document.getElementById("oppChips");
  oppC.innerHTML=[[1,"1 avversario (heads-up)"],[2,"2 avversari"]].map(([n,l])=>
    `<button class="chip${S.nOpp===n?' on':''}" data-n="${n}">${l}</button>`).join("");
  oppC.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{S.nOpp=+b.dataset.n;renderSetup();checkStart();});
  // carte
  const hs=document.getElementById("holeSlots");
  hs.innerHTML=S.hole.map((c,i)=>{const act=(S.active&&S.active.id==="hole"&&S.active.idx===i)?" active":"";
    return `<div class="slot${act}" data-i="${i}">${c?cardFace(c,'pc'):'<span class="ph">+</span>'}</div>`;}).join("");
  hs.querySelectorAll(".slot").forEach(el=>el.onclick=()=>{const i=+el.dataset.i;
    if(S.hole[i])S.hole[i]=null;S.active={idx:i,id:"hole"};rerender();});
  renderPicker("holePicker");
}
function checkStart(){document.getElementById("startBtn").disabled=!(S.table&&S.pos&&S.nOpp&&S.hole[0]&&S.hole[1]);}

/* ===================== STATO MANO (barra) ===================== */
function stateBar(){
  document.getElementById("stateBar").innerHTML=
    `<span>tavolo <b>${S.table}-max</b></span>
     <span>posizione <b>${S.pos}</b></span>
     <span>avversari <b>${S.nOpp}</b></span>
     <span>mano <b class="mini">${miniCards(S.hole)}</b></span>
     ${S.board.length?`<span>board <b class="mini">${miniCards(S.board)}</b></span>`:""}
     <span>piatto <b>${S.pot.toFixed(1)} BB</b></span>`;
}

/* ===================== VERDETTO ===================== */
function verdictHTML(d,eq,potOdds){
  return `<div class="verdict v-${d.tone}">${d.act}${d.size?`<small>${d.size}</small>`:""}</div>
    <p class="reason">${d.why}</p>
    <div class="eqbar"><i style="width:${Math.round(eq*100)}%"></i></div>
    <div class="stats">
      <div class="stat"><div class="n">${pct(eq)}</div><div class="k">equity</div></div>
      <div class="stat"><div class="n">${potOdds>0?pct(potOdds):'—'}</div><div class="k">pot odds</div></div>
      <div class="stat"><div class="n">${canon(S.hole[0],S.hole[1])}</div><div class="k">mano</div></div>
    </div>`;
}

/* ===================== PREFLOP ===================== */
function renderPreflop(){
  const key=canon(S.hole[0],S.hole[1]);
  const step=document.getElementById("step");
  if(!S.scenario){
    step.innerHTML=`<p class="eyebrow">Preflop</p>
      <p class="q">Qual è la situazione quando tocca a te?</p>
      <div class="btns">
        <button class="btn" id="scOpen">Sono il primo (apro io)</button>
        <button class="btn ghost" id="scRaise">Un avversario ha già rilanciato</button>
      </div>`;
    document.getElementById("scOpen").onclick=()=>{S.scenario="open";renderPreflop();};
    document.getElementById("scRaise").onclick=()=>{S.scenario="raise";renderPreflop();};
    return;
  }
  if(S.scenario==="open"){
    if(S.pos==="BB"){step.innerHTML=`<p class="reason">Dal BB non si apre: scegli \u201cUn avversario ha già rilanciato\u201d.</p>
      <div class="btns"><button class="btn" id="bk">Indietro</button></div>`;
      document.getElementById("bk").onclick=()=>{S.scenario=null;renderPreflop();};return;}
    const inRange=rfiFor(S.table,S.pos).has(key);
    const eq=equity(S.hole,[],S.nOpp,1,2500);
    const d=inRange?{act:"APRI",size:OPEN_SIZE[S.pos],tone:"raise",
        why:`<b>${key}</b> è dentro la range di apertura da <b>${S.pos}</b>. Equity vs ${S.nOpp} mano/i casuale/i ${pct(eq)}.`}
      :{act:"FOLD",size:"",tone:"fold",why:`<b>${key}</b> è fuori dalla range di apertura da ${S.pos}. Lascia.`};
    step.innerHTML=`<p class="eyebrow">Preflop · apertura</p>${verdictHTML(d,eq,0)}
      <p class="q" style="margin-top:18px">E gli avversari cosa hanno fatto?</p>
      <div class="btns">
        <button class="btn ghost" id="vf">Foldato (vinci i bui)</button>
        <button class="btn" id="vc">Chiamato</button>
        <button class="btn ghost" id="vr">Rilanciato (3-bet)</button>
      </div>`;
    document.getElementById("vf").onclick=()=>endHand("Tutti foldano: incassi i bui. Mano finita.");
    document.getElementById("vc").onclick=()=>{S.pot=2.5*S.nOpp+1.5;goFlop();};
    document.getElementById("vr").onclick=()=>faceThreeBet(key);
    return;
  }
  // scenario: affronto un rilancio
  step.innerHTML=`<p class="eyebrow">Preflop · affronti un rilancio</p>
    <div class="row">
      <div class="field"><label>Rilancio del villain (BB)</label><input id="rsize" type="number" value="2.5" step="0.5" min="1"></div>
      <div class="field"><label>Tipo di avversario</label><select id="vtight">
        <option value="0.30">Largo (~top 30%)</option>
        <option value="0.18" selected>Medio (~top 18%)</option>
        <option value="0.12">Stretto (~top 12%)</option></select></div>
    </div>
    <button class="btn" id="calc" style="margin-top:12px">Consigliami</button>
    <div id="out"></div>`;
  document.getElementById("calc").onclick=()=>{
    const R=Math.max(1,parseFloat(document.getElementById("rsize").value)||2.5);
    const frac=parseFloat(document.getElementById("vtight").value);
    const eq=equity(S.hole,[],1,frac,3000);
    const toCall=R-1, pot=R+1.5, potOdds=toCall/(pot+toCall);
    let d;
    if(THREEBET.has(key)) d={act:"RILANCIA",size:`3-bet a ~${(R*3).toFixed(1)} BB`,tone:"raise",
        why:`<b>${key}</b> è una mano da 3-bet per valore. Equity vs il range del rilanciatore ${pct(eq)}.`};
    else if(eq>=Math.max(potOdds,0.45)) d={act:"CALL",size:"",tone:"call",
        why:`Equity ${pct(eq)} ≥ pot odds ${pct(potOdds)} vs il suo range: chiamare regge.`};
    else d={act:"FOLD",size:"",tone:"fold",
        why:`Equity ${pct(eq)} insufficiente contro un rilancio: lascia.`};
    document.getElementById("out").innerHTML=verdictHTML(d,eq,potOdds)+
      (d.tone==="fold"?`<div class="btns" style="justify-content:center"><button class="btn ghost" id="end">Mano finita</button></div>`
        :`<div class="btns" style="justify-content:center"><button class="btn" id="toflop">Il villain chiama → vai al flop</button></div>`);
    const e=document.getElementById("end");if(e)e.onclick=()=>endHand("Hai foldato. Mano finita.");
    const t=document.getElementById("toflop");if(t)t.onclick=()=>{S.pot=2*R+1.5;goFlop();};
  };
}
function faceThreeBet(key){
  const step=document.getElementById("step");
  const is4=FOURBET.has(key);
  const d=is4?{act:"RILANCIA",size:"4-bet per valore",tone:"raise",why:`<b>${key}</b> regge anche un 4-bet.`}
    :THREEBET.has(key)?{act:"CALL",size:"",tone:"call",why:`<b>${key}</b>: contro il 3-bet, chiama e gioca il flop.`}
    :{act:"FOLD",size:"",tone:"fold",why:`<b>${key}</b> non regge un 3-bet: lascia.`};
  step.innerHTML=`<p class="eyebrow">Preflop · ti hanno 3-bettato</p>${verdictHTML(d,equity(S.hole,[],1,0.12,2500),0)}
    <div class="btns" style="justify-content:center">
      ${d.tone==="fold"?'<button class="btn ghost" id="end">Mano finita</button>'
        :'<button class="btn" id="toflop">Vai al flop</button>'}</div>`;
  const e=document.getElementById("end");if(e)e.onclick=()=>endHand("Hai foldato al 3-bet. Mano finita.");
  const t=document.getElementById("toflop");if(t)t.onclick=()=>{S.pot=12;goFlop();};
}

/* ===================== POSTFLOP ===================== */
function goFlop(){S.street="flop";S.board=[];S.scenario=null;rerender();}
function streetInfo(){return {flop:["Flop","3 carte",3],turn:["Turn","4ª carta",4],river:["River","5ª carta",5]}[S.street];}
function renderPostflop(){
  const[name,,need]=streetInfo();const step=document.getElementById("step");
  const haveBoard=S.board.filter(Boolean).length===need;
  if(!haveBoard){
    // assicura il numero giusto di slot
    while(S.board.length<need)S.board.push(null);
    S.board=S.board.slice(0,need);
    if(!S.active||S.active.id!=="board"){for(let i=0;i<need;i++)if(!S.board[i]){S.active={idx:i,id:"board"};break;}}
    step.innerHTML=`<p class="eyebrow">${name}</p><p class="q">Inserisci le carte del board (${name.toLowerCase()}).</p>
      <div class="slots" id="bSlots"></div><div class="picker" id="bPicker"></div>`;
    const bs=document.getElementById("bSlots");
    bs.innerHTML=S.board.map((c,i)=>{const act=(S.active&&S.active.id==="board"&&S.active.idx===i)?" active":"";
      return `<div class="slot${act}" data-i="${i}">${c?cardFace(c,'pc'):'<span class="ph">+</span>'}</div>`;}).join("");
    bs.querySelectorAll(".slot").forEach(el=>el.onclick=()=>{const i=+el.dataset.i;
      if(S.board[i])S.board[i]=null;S.active={idx:i,id:"board"};rerender();});
    renderPicker("bPicker");
    return;
  }
  // board completo → chiedo l'azione
  step.innerHTML=`<p class="eyebrow">${name} · decisione</p>
    <p class="q">Cosa succede su questa strada?</p>
    <div class="chips" id="actChips">
      <button class="chip on" data-a="me">Tocca a me (nessuna puntata)</button>
      <button class="chip" data-a="bet">Affronto una puntata</button>
    </div>
    <div class="row" id="betFields" style="margin-top:12px">
      <div class="field"><label>Piatto attuale (BB)</label><input id="pot" type="number" value="${S.pot.toFixed(1)}" step="0.5" min="0"></div>
      <div class="field hidden" id="callField"><label>Puntata da chiamare (BB)</label><input id="tocall" type="number" value="${(S.pot*0.66).toFixed(1)}" step="0.5" min="0"></div>
      <div class="field"><label>Avversari (range)</label><select id="vt">
        <option value="1">Casuale</option><option value="0.6" selected>Medio</option><option value="0.3">Stretto</option></select></div>
    </div>
    <button class="btn" id="calc" style="margin-top:10px">Consigliami</button>
    <div id="out"></div>`;
  let facing=false;
  document.querySelectorAll("#actChips .chip").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#actChips .chip").forEach(x=>x.classList.remove("on"));b.classList.add("on");
    facing=(b.dataset.a==="bet");document.getElementById("callField").classList.toggle("hidden",!facing);});
  document.getElementById("calc").onclick=()=>{
    const pot=Math.max(0,parseFloat(document.getElementById("pot").value)||0);
    const toCall=facing?Math.max(0,parseFloat(document.getElementById("tocall").value)||0):0;
    const frac=parseFloat(document.getElementById("vt").value);
    S.pot=pot;
    const board=S.board.filter(Boolean);
    const eq=equity(S.hole,board,S.nOpp,frac,S.nOpp>1?2500:3500);
    const potOdds=toCall>0?toCall/(pot+toCall):0;
    let d;
    if(toCall>0){
      if(eq>=0.75) d={act:"RILANCIA",size:"per valore",tone:"raise",why:`Equity altissima ${pct(eq)} vs ${S.nOpp}: spingi.`};
      else if(eq>=potOdds) d={act:"CALL",size:"",tone:"call",why:`Equity ${pct(eq)} ≥ pot odds ${pct(potOdds)}: chiamare è profittevole.`};
      else d={act:"FOLD",size:"",tone:"fold",why:`Equity ${pct(eq)} < pot odds ${pct(potOdds)}: lascia.`};
    } else {
      if(eq>=0.60) d={act:"PUNTA",size:"~2/3 del piatto",tone:"raise",why:`Buona equity ${pct(eq)} vs ${S.nOpp}: punta valore.`};
      else d={act:"CHECK",size:"",tone:"check",why:`Equity media ${pct(eq)}: controlla e prosegui.`};
    }
    const nextLabel=S.street==="river"?"Fine mano":"Prossima strada →";
    document.getElementById("out").innerHTML=verdictHTML(d,eq,potOdds)+
      `<div class="btns" style="justify-content:center">
         <button class="btn" id="next">${nextLabel}</button></div>`;
    document.getElementById("next").onclick=()=>{
      if(S.street==="river")return endHand("Mano completata. Buona fortuna allo showdown!");
      S.street=S.street==="flop"?"turn":"river";S.active=null;rerender();};
  };
}

/* ===================== FINE / ROUTING ===================== */
function endHand(msg){S.street="done";document.getElementById("step").innerHTML=
  `<p class="eyebrow">Mano finita</p><p class="reason" style="font-size:16px">${msg}</p>`;stateBar();}
function rerender(){
  if(S.street==="setup"){renderSetup();checkStart();return;}
  document.getElementById("setup").classList.add("hidden");
  document.getElementById("play").classList.remove("hidden");
  stateBar();
  if(S.street==="preflop")renderPreflop();
  else if(["flop","turn","river"].includes(S.street))renderPostflop();
}

/* ===================== INIT ===================== */
function resetAll(){Object.assign(S,{table:null,pos:null,nOpp:null,hole:[null,null],board:[],street:"setup",
  pot:0,toCall:0,scenario:null,active:null});
  document.getElementById("play").classList.add("hidden");
  document.getElementById("setup").classList.remove("hidden");renderSetup();checkStart();}
document.getElementById("startBtn").onclick=()=>{S.street="preflop";S.scenario=null;rerender();};
document.getElementById("resetBtn").onclick=resetAll;
renderSetup();
</script>
</body>
</html>
